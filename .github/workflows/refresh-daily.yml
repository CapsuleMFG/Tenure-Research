name: Daily refresh (futures only)

# Daily at 22:00 UTC + manual trigger. Pulls daily front-month futures
# (livestock + grains) via yfinance and commits the refreshed
# observations.parquet to main. The weekly cron does the full refresh
# including forecasts; this one is the cheap daily update so the
# Costs page and Plan-page market chips stay current.
#
# Daily AMS LMR cash was considered and rejected: USDA MARS API requires
# eAuth Level 2 (in-person identity proofing) — too much friction for an
# open-access dashboard. Public-PDF scraping is fragile and fails
# silently when USDA tweaks report layouts. Daily front-month futures
# cover the "what is the market doing today" need defensibly: cash
# settles to futures over the contract month via basis.
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-artifacts
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project dependencies
        run: uv sync --no-dev

      - name: Sync daily front-month futures (yfinance)
        run: |
          uv run python -c "
          from usda_sandbox.futures_daily import sync_daily_futures, append_daily_to_observations
          sync_daily_futures()
          append_daily_to_observations()
          "

      - name: Commit refreshed observations.parquet to main
        run: |
          set -e
          git config user.name  "tenure-brief-bot"
          git config user.email "tenure-brief-bot@users.noreply.github.com"

          git add data/clean/observations.parquet
          if git diff --cached --quiet; then
            echo "No artifact changes; nothing to commit."
            exit 0
          fi
          git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"

          git pull --rebase origin main || true
          git push origin main
