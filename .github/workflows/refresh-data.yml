name: Refresh data + rebake forecasts (weekly)

# Sunday 21:00 UTC + manual trigger. Pulls fresh USDA ERS XLSX files,
# yfinance continuous + daily futures (livestock + grains), rebuilds
# observations.parquet, rebakes forecasts.json, and commits both
# artifacts directly to main. Streamlit Cloud auto-redeploys.
on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-artifacts
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for rebase

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project dependencies
        run: uv sync --no-dev

      - name: Sync ERS XLSX downloads
        run: |
          uv run python -c "
          from usda_sandbox.ingest import sync_downloads
          sync_downloads()
          "

      - name: Sync monthly continuous futures (yfinance)
        run: |
          uv run python -c "
          from usda_sandbox.futures_continuous import sync_continuous_futures
          sync_continuous_futures()
          "

      - name: Clean into observations.parquet
        run: |
          uv run python -c "
          from usda_sandbox.clean import clean_all
          clean_all('data/catalog.json', 'data/raw',
                    'data/clean/observations.parquet')
          "

      - name: Sync daily front-month futures (livestock + grains)
        run: |
          uv run python -c "
          from usda_sandbox.futures_daily import sync_daily_futures, append_daily_to_observations
          sync_daily_futures()
          append_daily_to_observations()
          "

      - name: Rebake forecasts.json
        run: |
          uv run python -m usda_sandbox.precompute \
            --out-path data/clean/forecasts.json

      - name: Commit refreshed artifacts to main
        run: |
          set -e
          git config user.name  "tenure-brief-bot"
          git config user.email "tenure-brief-bot@users.noreply.github.com"

          git add data/clean/observations.parquet data/clean/forecasts.json
          if git diff --cached --quiet; then
            echo "No artifact changes; nothing to commit."
            exit 0
          fi
          git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"

          # Rebase on top of any concurrent code commits before pushing.
          git pull --rebase origin main || true
          git push origin main
